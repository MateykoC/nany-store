<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NANY — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <p class="logo" style="font-size:2rem;margin-bottom:.25rem"><span class="logo-n">N</span>ANY</p>
    <p style="color:#888;margin-bottom:2rem;font-size:.9rem">Panel de administración</p>
    <label class="form-label">Contraseña</label>
    <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" />
    <p class="form-error" id="loginError"></p>
    <button class="btn-primary" id="loginBtn" style="width:100%;margin-top:1rem">Ingresar</button>
  </div>
</div>

<!-- ══ ADMIN PANEL ══ -->
<div class="admin-layout" id="adminPanel" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-n">N</span>ANY
    </div>
    <nav class="sidebar-nav">
      <button class="snav-btn active" data-tab="productos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Productos
      </button>
      <button class="snav-btn" data-tab="categorias">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Categorías
      </button>
      <button class="snav-btn" data-tab="nosotros">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Sobre Nosotros
      </button>
    </nav>
    <button class="snav-btn logout-btn" id="logoutBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Salir
    </button>
  </aside>

  <!-- Main -->
  <main class="admin-main">

    <!-- ── TAB: PRODUCTOS ── -->
    <div class="tab-panel active" id="tab-productos">
      <div class="panel-header">
        <h2>Productos</h2>
        <button class="btn-primary" id="newProductBtn">+ Nuevo producto</button>
      </div>

      <!-- Form -->
      <div class="card form-card" id="productFormCard" style="display:none">
        <h3 id="productFormTitle">Nuevo producto</h3>
        <form id="productForm">
          <input type="hidden" id="productId" />
          <div class="form-grid">
            <div>
              <label class="form-label">Nombre *</label>
              <input type="text" class="form-input" id="pNombre" required />
            </div>
            <div>
              <label class="form-label">Precio *</label>
              <input type="number" class="form-input" id="pPrecio" min="0" step="0.01" required />
            </div>
            <div class="full">
              <label class="form-label">Descripción</label>
              <textarea class="form-input form-textarea" id="pDescripcion"></textarea>
            </div>
            <div>
              <label class="form-label">Categoría</label>
              <select class="form-input" id="pCategoria">
                <option value="">Sin categoría</option>
              </select>
            </div>
            <div>
              <label class="form-label">Imagen (máx. 2MB)</label>
              <input type="file" class="form-input" id="pImagen" accept="image/*" />
              <p class="form-hint" id="imageHint"></p>
              <div id="imagePreview" class="image-preview" style="display:none">
                <img id="previewImg" src="" alt="Preview" />
                <button type="button" class="remove-img-btn" id="removeImgBtn">✕ Quitar imagen</button>
              </div>
            </div>
            <div class="full">
              <label class="checkbox-label">
                <input type="checkbox" id="pHabilitadoCarrito" checked />
                <span>Permitir agregar al carrito</span>
              </label>
            </div>
          </div>
          <p class="form-error" id="productError"></p>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="saveProductBtn">Guardar</button>
            <button type="button" class="btn-secondary" id="cancelProductBtn">Cancelar</button>
          </div>
        </form>
      </div>

      <!-- Table -->
      <div class="card" id="productsTableCard">
        <div class="table-wrap">
          <table class="admin-table" id="productsTable">
            <thead>
              <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Categoría</th>
                <th>Carrito</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr><td colspan="6" class="table-empty">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── TAB: CATEGORÍAS ── -->
    <div class="tab-panel" id="tab-categorias">
      <div class="panel-header">
        <h2>Categorías</h2>
      </div>
      <div class="card" style="max-width:500px">
        <h3>Nueva categoría</h3>
        <div style="display:flex;gap:.75rem;margin-top:1rem">
          <input type="text" class="form-input" id="newCatName" placeholder="Nombre de categoría" style="flex:1" />
          <button class="btn-primary" id="addCatBtn">Agregar</button>
        </div>
        <p class="form-error" id="catError"></p>
        <ul class="cat-list" id="catList"></ul>
      </div>
    </div>

    <!-- ── TAB: NOSOTROS ── -->
    <div class="tab-panel" id="tab-nosotros">
      <div class="panel-header">
        <h2>Sobre Nosotros</h2>
      </div>
      <div class="card" style="max-width:700px">
        <label class="form-label">Texto de la sección "Sobre Nosotros"</label>
        <textarea class="form-input form-textarea" id="nosotrosInput" rows="6" style="min-height:160px"></textarea>
        <div class="form-actions">
          <button class="btn-primary" id="saveNosotrosBtn">Guardar cambios</button>
        </div>
        <p class="form-success" id="nosotrosSuccess"></p>
      </div>
    </div>

  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
